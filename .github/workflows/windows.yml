---

name: windows

on:
  pull_request:

  push:
    branches:
      - master

jobs:
  test:
    runs-on: windows-2022

    strategy:
      fail-fast: false

      matrix:
        version: [3.1.6, 3.2.7, 3.3.7]

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.version }}

      - name: Setup dependencies
        shell: bash
        run: bin/setup.sh

      - name: Run tests
        run: ruby bin/rake

    timeout-minutes: 15
